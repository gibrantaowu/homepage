{% include base_path %}
{% if page.author and site.data.authors[page.author] %}
  {% assign author = site.data.authors[page.author] %}
{% else %}
  {% assign author = site.author %}
{% endif %}
{% if author.avatar contains "://" %}
  <img src="{{ author.avatar }}" alt="{{ author.name | escape }}" loading="eager" decoding="async" />
{% else %}
  <img src="{{ author.avatar | prepend: '/images/' | prepend: base_path }}" alt="{{ author.name | escape }}" loading="eager" decoding="async" />
{% endif %}
